    - name: Registrar status de comissionamento BBU
      ansible.builtin.shell: |
        echo "$(date '+%Y-%m-%d %H:%M:%S') - Comissionamento BBU OAI Finalizado" >> {{ ansible_env.HOME }}/registros.txt
