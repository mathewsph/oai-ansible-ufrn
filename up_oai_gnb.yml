---
- name: Up BBU server
  hosts: gnb
  vars:
    username: "lance"
    user_home: "/home/{{ username }}"
    interface: "enp6s0f0"
    slice_parts_ip_BBU: "172.31.0.56"
    slice_parts_ip_Core: "172.31.0.212"
    trafficlimit_down: ""
    trafficlimit_up: ""
    essential_packages:
    - ca-certificates
    - autoconf
    - automake
    - ccache
    - build-essential
    - cmake
    - doxygen
    - ethtool
    - g++
    - inetutils-tools
    - libboost-all-dev
    - libncurses5
    - libncurses5-dev
    - libusb-1.0-0
    - libusb-1.0-0-dev
    - libusb-dev
    - python3-dev
    - python3-pip
    - python3-mako
    - python3-numpy
    - python3-requests
    - python3-scipy
    - python3-setuptools
    - python3-ruamel.yaml
    - git
    - curl
    - tree
    - vim
    - nfs-common
    - openssh-server
    - net-tools
    - lsb-release
    - gnupg
    - wireshark
    - tmux

  tasks:
    - name: Registrar status de comissionamento BBU - inicio do playbook - [{{ ansible_date_time.time }}]
      become: yes
      ansible.builtin.shell: |
        echo "$(date '+%Y-%m-%d %H:%M:%S') - Playbook BBU OAI Iniciado" >> /home/lance/registros.txt

    - name: Check if reboot required
      stat:
        path: /var/run/reboot-required
      register: reboot_required_file

    - name: Reboot if required (due to kernel update)
      become: true
      reboot:
        msg: Rebooting due to a kernel update
      when: reboot_required_file.stat.exists

    - name: Install essential packages
      become: true
      package:
        name: "{{ essential_packages }}"
        state: present    

    - name: Forçar instalação do python3-six via raw (necessário para Ubuntu 24.04)
      ansible.builtin.raw: apt-get update && apt-get install -y python3-six
      become: yes
      changed_when: false

    - name: Registrar inicio
      ansible.builtin.lineinfile:
        path: "{{ user_home }}/registros.txt"
        line: "{{ lookup('pipe', 'date +%Y-%m-%d\\ %H:%M:%S') }} - Iniciado"
        create: yes
      become: false  # Garante que crie como usuário lance   
        
    #role setup-uhd      
    - name: Verificar se diretório UHD existe
      ansible.builtin.stat:
        path: "{{ user_home }}/uhd"
      register: uhd_dir

    - name: "Clone UHD repository"
      git:
        repo: https://github.com/EttusResearch/uhd.git
        dest: "{{ user_home }}/uhd"
        version: UHD-4.7
        update: no
      when: not uhd_dir.stat.exists

    - name: Permission for UHD
      become: true
      shell: |
        chmod 755 -R {{ ansible_env.HOME }}/uhd
      when: not uhd_dir.stat.exists

    - name: Ensure the UHD/host/build directory exists
      file:
        path: "{{ user_home }}/uhd/host/build"
        state: directory
      when: not uhd_dir.stat.exists

    - name: Cmake UHD
      command: cmake ../
      args:
        chdir: "{{ user_home }}/uhd/host/build"
        creates: "{{ user_home }}/uhd/host/build/CMakeCache.txt"
      when: not uhd_dir.stat.exists

    - name: Build UHD
      become: true
      shell: |
        make -j"$(nproc)"
        make install
        ldconfig
      args:
        chdir: "{{ user_home }}/uhd/host/build"
        creates: /usr/local/bin/uhd_find_devices
      when: not uhd_dir.stat.exists

    - name: USRP images downloader
      become: true
      ansible.builtin.command: /usr/local/lib/uhd/utils/uhd_images_downloader.py
      when: not uhd_dir.stat.exists

    - name: Permitir execução de nr-softmodem sem senha (via sudoers.d)
      become: true
      ansible.builtin.lineinfile:
        path: /etc/sudoers.d/nr_softmodem
        line: "{{ username }} ALL=(ALL) NOPASSWD: {{ user_home }}/openairinterface5g/cmake_targets/ran_build/build/nr-softmodem"
        create: yes
        mode: '0440'
        validate: '/usr/sbin/visudo -cf %s'

    - name: Registrar status de comissionamento BBU
      become: yes
      ansible.builtin.shell: |
        echo "$(date '+%Y-%m-%d %H:%M:%S') - Comissionamento BBU OAI Iniciado" >> /home/lance/registros.txt

    
    #pmano-5g/setup-openairinterface5g
    - name: "Clone openairinterface5g repository"
      git:
        repo: https://gitlab.eurecom.fr/oai/openairinterface5g.git
        dest: "{{ user_home }}/openairinterface5g"
        version: 2024.w42
        update: no
   

    - name: Instalar dependências de interface (Xforms) para Scopes
      become: true
      ansible.builtin.apt:
        name: 
          - libforms-dev
          - libforms-bin
          - libx11-dev
          - libxpm-dev
        state: present

    - name: Build openairinterface5g
      become: true
      shell: |
        source oaienv
        cd cmake_targets
        ./build_oai -I
        ./build_oai -I --install-optional-packages
        ./build_oai -w USRP --ninja --gNB --eNB --nrUE -C --build-lib "uescope nrscope enbscope telnetsrv"
        chmod 755 -R {{ user_home }}/openairinterface5g
      args:
        chdir: "{{ user_home }}/openairinterface5g"
        creates: "{{ user_home }}/openairinterface5g/cmake_targets/ran_build/build/nr-softmodem"

    # - name: Verificar se kernel lowlatency já está instalado
    #   ansible.builtin.shell: dpkg -l | grep linux-image | grep lowlatency || true
    #   register: lowlatency_kernel_check
    #   changed_when: false

    # - name: Instalar kernel lowlatency se não estiver instalado
    #   become: true
    #   ansible.builtin.apt:
    #     name:
    #       - linux-image-lowlatency
    #       - linux-headers-lowlatency
    #     state: present
    #     update_cache: yes
    #   when: lowlatency_kernel_check.stdout == ""

    # - name: Atualizar GRUB para aplicar novo kernel
    #   ansible.builtin.command: update-grub
    #   become: true
    #   when: lowlatency_kernel_check.stdout == ""

    # - name: Reboot para aplicar kernel lowlatency
    #   become: true
    #   ansible.builtin.reboot:
    #     msg: "Reiniciando para ativar kernel lowlatency"
    #     connect_timeout: 5
    #     reboot_timeout: 600
    #   when: lowlatency_kernel_check.stdout == ""
    
    - name: Ajustar rotas
      become: true
      ansible.builtin.command: ip route replace 192.168.70.128/26 via 172.31.0.212 dev enp6s0f0
        #when: slice_parts_ip_Core != slice_parts_ip_BBU
      ignore_errors: true
      
    - name: Copy gnb.sa.band78.fr1.106PRB.usrpb210.conf template
      template: 
        src: gnb.sa.band78.fr1.106PRB.usrpb210.conf
        dest: "{{ user_home }}/openairinterface5g/targets/PROJECTS/GENERIC-NR-5GC/CONF"

    - name: Garantir que o usuário lance é dono da pasta do OAI
      become: true
      ansible.builtin.file:
        path: "{{ user_home }}/openairinterface5g"
        owner: "{{ username }}"
        group: "{{ username }}"
        recurse: yes  # O equivalente ao -R (recursivo)
    
    - name: Exibir valores de interface e limites de tráfego
      debug:
        msg:
          - "interface: {{ interface }}"
          - "trafficlimit_down: {{ trafficlimit_down | default('') }}"
          - "trafficlimit_up: {{ trafficlimit_up | default('') }}"

    - name: Aplicar limite de download (downlink)
      become: true
      shell: |
        tc qdisc del dev {{ interface }} root || true
        tc qdisc add dev {{ interface }} root handle 1: htb default 10
        tc class add dev {{ interface }} parent 1: classid 1:10 htb rate {{ trafficlimit_down }} ceil {{ trafficlimit_down }}
      when: trafficlimit_down != ""

    - name: Aplicar limite de upload (uplink)
      become: true
      shell: |
        tc qdisc del dev {{ interface }} ingress || true
        tc qdisc add dev {{ interface }} handle ffff: ingress
        tc filter add dev {{ interface }} parent ffff: protocol ip u32 match u32 0 0 police rate {{ trafficlimit_up }} burst 10k drop flowid :1
      when: trafficlimit_up != ""

    - name: Execute tmux BBU session
      command: "tmux new -d -s bbu_session \"cd ~/openairinterface5g/cmake_targets/ran_build/build/ && sudo ./nr-softmodem -E --sa -O ../../../targets/PROJECTS/GENERIC-NR-5GC/CONF/gnb.sa.band78.fr1.106PRB.usrpb210.conf --continuous-tx --gNBs.[0].min_rxtxtime 6\""
      #command: "tmux new -d -s bbu_session \"cd ~/openairinterface5g/cmake_targets/ran_build/build/ && sudo ./nr-softmodem --rfsimulator server --rfsim --sa -O ../../../targets/PROJECTS/GENERIC-NR-5GC/CONF/gnb.sa.band78.fr1.106PRB.usrpb210.conf --continuous-tx --gNBs.[0].min_rxtxtime 6\""
    
    - name: Registrar status de comissionamento BBU
      ansible.builtin.shell: |
        echo "$(date '+%Y-%m-%d %H:%M:%S') - Comissionamento BBU OAI Finalizado" >> {{ ansible_env.HOME }}/registros.txt
