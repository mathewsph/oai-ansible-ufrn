---
- name: Up BBU server
  hosts: gnb
  become: yes
  vars:
    username: "lance"
    user_home: "/home/{{ username }}"
    #interface: "{{ interface }}"
      #slice_parts_ip_BBU: "{{ slice_parts | selectattr('components', 'contains', {'name': 'BBU'}) | map(attribute='ip') | list | first }}"
      #slice_parts_ip_Core: "{{ slice_parts | selectattr('components', 'contains', {'name': 'Core'}) | map(attribute='ip') | list | first }}"
      #trafficlimit_down: "{{ (trafficlimit | default({})).down | default('') }}"
      #trafficlimit_up: "{{ (trafficlimit | default({})).up | default('') }}"

      #roles:
      #- role: pmano/ensure-system-updated

      #- role: pmano/install-packages
      #vars:
      #  packages: "{{ essential_packages }}"

      #- role: pmano-5g/setup-uhd

      #- role: pmano-5g/setup-openairinterface5g
  
  tasks:
    - name: Registrar inicio
      ansible.builtin.shell: |
        echo "$(date '+%Y-%m-%d %H:%M:%S') - Iniciado" >> {{ user_home }}/registros.txt
        
    #Role ensure-system-updated    
    - name: Checar se é necessário realizar reboot
      stat:
        path: /var/run/reboot-required
      register: reboot_required_file

    - name: Reboot if required (due to kernel update)
      become: true
      reboot:
        msg: Rebooting due to a kernel update
      when: reboot_required_file.stat.exists
  
    #Role install-packages
    - name: Instalar dependências necessárias para a compilação do OAI RAN
      become : true
      apt:
        name:
          - ca-certificates
          - autoconf
          - automake
          - ccache
          - build-essential
          - cmake
          - doxygen
          - ethtool
          - g++
          - inetutils-tools
          - libboost-all-dev
          - libncurses5
          - libncurses5-dev
          - libusb-1.0-0
          - libusb-1.0-0-dev
          - libusb-dev
          - python3-dev
          - python3-pip
          - python3-mako
          - python3-numpy
          - python3-requests
          - python3-scipy
          - python3-setuptools
          - python3-ruamel.yaml
          - git
          - curl
          - tree
          - vim
          - nfs-common
          - openssh-server
          - net-tools
          - lsb-release
          - gnupg
          - wireshark
          - tmux
    
    #role setup-uhd      
    - name: Verificar se diretório UHD existe
      ansible.builtin.stat:
        path: "{{ ansible_env.HOME }}/uhd"
      register: uhd_dir

    - name: "Clone UHD repository"
      git:
        repo: https://github.com/EttusResearch/uhd.git
        dest: "{{ ansible_env.HOME }}/uhd"
        version: UHD-4.7
        update: no
      when: not uhd_dir.stat.exists

    - name: Permission for UHD
      become: true
      shell: |
        chmod 755 -R {{ ansible_env.HOME }}/uhd
      when: not uhd_dir.stat.exists

    - name: Ensure the UHD/host/build directory exists
      file:
        path: "{{ ansible_env.HOME }}/uhd/host/build"
        state: directory
      when: not uhd_dir.stat.exists

    - name: Cmake UHD
      command: cmake ../
      args:
        chdir: "{{ ansible_env.HOME }}/uhd/host/build"
        creates: "{{ ansible_env.HOME }}/uhd/host/build/CMakeCache.txt"
      when: not uhd_dir.stat.exists

    - name: Build UHD
      become: true
      shell: |
        make -j"$(nproc)"
        make install
        ldconfig
      args:
        chdir: "{{ ansible_env.HOME }}/uhd/host/build"
        creates: /usr/local/bin/uhd_find_devices
      when: not uhd_dir.stat.exists

    - name: USRP images downloader
      become: true
      ansible.builtin.command: /usr/local/lib/uhd/utils/uhd_images_downloader.py
      when: not uhd_dir.stat.exists

    - name: Permitir execução de nr-softmodem sem senha (via sudoers.d)
      become: true
      ansible.builtin.lineinfile:
        path: /etc/sudoers.d/nr_softmodem
        line: "{{ ansible_user }} ALL=(ALL) NOPASSWD: {{ ansible_env.HOME }}/openairinterface5g/cmake_targets/ran_build/build/nr-softmodem"
        create: yes
        mode: '0440'
        validate: '/usr/sbin/visudo -cf %s'
      when: not uhd_dir.stat.exists
    
    #pmano-5g/setup-openairinterface5g
    - name: "Clone openairinterface5g repository"
      git:
        repo: https://gitlab.eurecom.fr/oai/openairinterface5g.git
        dest: "{{ ansible_env.HOME }}/openairinterface5g"
        version: 2024.w42
        update: no
        
    - name: Build openairinterface5g
      become: true
      shell: |
        source oaienv
        cd cmake_targets
        ./build_oai -I
        ./build_oai -I --install-optional-packages
        ./build_oai -w USRP --ninja --gNB --eNB --nrUE -C --build-lib "uescope nrscope enbscope telnetsrv"
        chmod 755 -R {{ ansible_env.HOME }}/openairinterface5g
      args:
        chdir: "{{ ansible_env.HOME }}/openairinterface5g"
        creates: "{{ ansible_env.HOME }}/openairinterface5g/cmake_targets/ran_build/build/nr-softmodem"
    
    # - name: Verificar se kernel lowlatency já está instalado
    #   ansible.builtin.shell: dpkg -l | grep linux-image | grep lowlatency || true
