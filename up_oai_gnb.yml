    - name: Execute tmux BBU session
      command: "tmux new -d -s bbu_session \"cd ~/openairinterface5g/cmake_targets/ran_build/build/ && sudo ./nr-softmodem -E --sa -O ../../../targets/PROJECTS/GENERIC-NR-5GC/CONF/gnb.sa.band78.fr1.106PRB.usrpb210.conf --continuous-tx --gNBs.[0].min_rxtxtime 6\""
